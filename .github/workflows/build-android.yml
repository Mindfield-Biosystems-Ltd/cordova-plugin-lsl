name: Build Android liblsl

on:
  workflow_dispatch:
    inputs:
      liblsl_version:
        description: 'liblsl version to build'
        required: false
        default: '1.17.5'
  release:
    types: [published]

jobs:
  build:
    name: Build liblsl for Android
    runs-on: ubuntu-latest

    env:
      LIBLSL_VERSION: ${{ inputs.liblsl_version || '1.17.5' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK and NDK
        run: |
          # Install Android command-line tools if not present
          if [ -z "${ANDROID_HOME:-}" ]; then
            export ANDROID_HOME="${HOME}/android-sdk"
            mkdir -p "${ANDROID_HOME}"
          fi
          echo "ANDROID_HOME=${ANDROID_HOME}" >> $GITHUB_ENV

          # Install NDK via sdkmanager
          yes | ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true
          ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager "ndk;26.3.11579264" 2>/dev/null || \
            sdkmanager "ndk;26.3.11579264" 2>/dev/null || true

          # Find NDK
          NDK_DIR="${ANDROID_HOME}/ndk/26.3.11579264"
          if [ ! -d "${NDK_DIR}" ]; then
            # Try to find any installed NDK
            NDK_DIR=$(find "${ANDROID_HOME}/ndk" -maxdepth 1 -mindepth 1 -type d 2>/dev/null | sort -V | tail -n 1)
          fi

          if [ -z "${NDK_DIR}" ] || [ ! -d "${NDK_DIR}" ]; then
            echo "ERROR: Could not find Android NDK"
            echo "ANDROID_HOME contents:"
            ls -la "${ANDROID_HOME}/" || true
            ls -la "${ANDROID_HOME}/ndk/" || true
            exit 1
          fi

          echo "ANDROID_NDK_HOME=${NDK_DIR}" >> $GITHUB_ENV
          echo "Using NDK: ${NDK_DIR}"

      - name: Install build tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq cmake ninja-build

      - name: Remove existing .so files (force rebuild)
        run: |
          rm -f src/android/libs/arm64-v8a/liblsl.so
          rm -f src/android/libs/armeabi-v7a/liblsl.so
          rm -f src/android/libs/x86_64/liblsl.so
          rm -f src/android/libs/arm64-v8a/liblsl_jni.so
          rm -f src/android/libs/armeabi-v7a/liblsl_jni.so
          rm -f src/android/libs/x86_64/liblsl_jni.so

      - name: Build liblsl for Android
        run: |
          chmod +x scripts/build-android.sh
          scripts/build-android.sh

      - name: Verify build outputs
        run: |
          echo "Checking build outputs..."
          for arch in arm64-v8a armeabi-v7a x86_64; do
            lib="src/android/libs/${arch}/liblsl.so"
            if [ ! -f "${lib}" ]; then
              echo "ERROR: Missing ${lib}"
              exit 1
            fi
            echo "  ${arch}: $(du -h "${lib}" | cut -f1)"
            file "${lib}"
          done
          echo ""
          echo "All Android libraries built successfully."

      - name: Upload all Android libs
        uses: actions/upload-artifact@v4
        with:
          name: liblsl-android-all
          path: |
            src/android/libs/arm64-v8a/*.so
            src/android/libs/armeabi-v7a/*.so
            src/android/libs/x86_64/*.so
          retention-days: 90
