/**
 * cordova-plugin-lsl - Android native build configuration.
 *
 * Configures CMake to build the JNI bridge (lsl_jni.c) and link against
 * the pre-built liblsl.so for each target architecture.
 */

android {
    defaultConfig {
        externalNativeBuild {
            cmake {
                arguments "-DLSL_LIB_DIR=${project.projectDir}/libs/${android.defaultConfig.ndk.abiFilters?.first() ?: 'arm64-v8a'}",
                          "-DLSL_INCLUDE_DIR=${project.projectDir}/src/de/mindfield/cordova/lsl/jni"
            }
        }
        ndk {
            abiFilters 'arm64-v8a', 'armeabi-v7a', 'x86_64'
        }
    }

    externalNativeBuild {
        cmake {
            path "src/de/mindfield/cordova/lsl/jni/CMakeLists.txt"
            version "3.18.1+"
        }
    }

    // Ensure pre-built .so files are packaged into the APK
    sourceSets {
        main {
            jniLibs.srcDirs = ['libs']
        }
    }
}
